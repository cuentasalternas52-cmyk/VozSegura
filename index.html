<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VozSegura — Sistema de Apoyo y Protección para Mujeres</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/css/style.css"/>
</head>
<body class="landing-body">

  <!-- DOTS BACKGROUND -->
  <div class="dots-bg"></div>

  <div class="landing-split">

    <!-- LEFT PANEL -->
    <div class="landing-left">
      <!-- Logo -->
      <div class="brand">
        <div class="brand-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2"><path d="M11 5.882V19.24a1.76 1.76 0 0 1-3.417.592l-2.147-6.15M18 13a3 3 0 1 0 0-6M5.436 13.683A4.001 4.001 0 0 0 7 6h1.832c4.1 0 7.625-1.234 9.168-3"/></svg>
        </div>
        <div>
          <div class="brand-name">VozSegura</div>
          <div class="brand-sub">Sistema Integral de Apoyo<br/>y Protección para Mujeres</div>
        </div>
      </div>

      <!-- Headline -->
      <div class="landing-headline">
        <h1>Bienvenida</h1>
        <p>Apoyo, orientación y protección<br/>para mujeres</p>
      </div>

      <!-- Buttons -->
      <div class="landing-actions">
        <a href="login.html" class="btn btn-purple">Iniciar sesión <span class="btn-arrow">›</span></a>
        <a href="register.html" class="btn btn-outline-purple">Registrarse</a>
      </div>

      <!-- ODS badge -->
      <div class="ods-badge">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        ODS 5: Igualdad de Género
      </div>
    </div>

    <!-- RIGHT PANEL — Illustration -->
    <div class="landing-right">
      <div class="landing-illustration">
        <!-- Decorative circles -->
        <div class="ilu-circle big"></div>
        <div class="ilu-circle med"></div>
        <!-- Female symbol decorations -->
        <div class="ilu-symbol s1">♀</div>
        <div class="ilu-symbol s2">♀</div>
        <div class="ilu-symbol s3">✦</div>
        <!-- Character SVG -->
        <svg class="ilu-char" viewBox="0 0 220 280" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Body -->
          <ellipse cx="110" cy="210" rx="55" ry="60" fill="#7C3AED" opacity=".85"/>
          <!-- Head -->
          <circle cx="110" cy="105" r="38" fill="#FBBF7A"/>
          <!-- Hair -->
          <path d="M72 95 Q75 55 110 58 Q145 55 148 95 Q148 75 110 72 Q72 75 72 95Z" fill="#4C1D95"/>
          <path d="M72 95 Q68 130 75 145" stroke="#4C1D95" stroke-width="8" stroke-linecap="round"/>
          <!-- Raised fist arm -->
          <path d="M148 120 Q175 100 178 70" stroke="#7C3AED" stroke-width="14" stroke-linecap="round"/>
          <rect x="168" y="52" width="24" height="26" rx="5" fill="#FBBF7A"/>
          <path d="M168 58 h24 M168 64 h24 M168 70 h24" stroke="#F59E0B" stroke-width="1.5"/>
          <!-- Other arm holding megaphone -->
          <path d="M72 130 Q45 140 38 155" stroke="#7C3AED" stroke-width="14" stroke-linecap="round"/>
          <!-- Megaphone -->
          <path d="M20 148 L42 138 L42 168 L20 158 Z" fill="#9333EA"/>
          <rect x="42" y="142" width="12" height="22" rx="3" fill="#7C3AED"/>
          <path d="M42 155 Q55 155 60 148" stroke="#C4B5FD" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M42 153 Q55 153 60 160" stroke="#C4B5FD" stroke-width="2.5" stroke-linecap="round"/>
          <!-- Flowers / decorative -->
          <circle cx="170" cy="240" r="10" fill="#DDD6FE" opacity=".7"/>
          <circle cx="50" cy="250" r="7" fill="#EDE9FE" opacity=".8"/>
          <circle cx="185" cy="200" r="6" fill="#C4B5FD" opacity=".6"/>
          <!-- Leaves -->
          <ellipse cx="160" cy="255" rx="12" ry="6" fill="#A78BFA" opacity=".5" transform="rotate(-30 160 255)"/>
          <ellipse cx="55" cy="240" rx="10" ry="5" fill="#DDD6FE" opacity=".5" transform="rotate(20 55 240)"/>
        </svg>
      </div>
    </div>

    <div class="hero-image">
        <img src="imagenes/ilustracion VozSegura.png" alt="Ilustración">
    </div>

  </div>

  <script src="assets/js/landing.js"></script>
</body>
</html>
