<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inicio — VozSegura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/css/style.css"/>
</head>
<body class="app-body">

  <div class="app-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon sm"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2"><path d="M11 5.882V19.24a1.76 1.76 0 0 1-3.417.592l-2.147-6.15M18 13a3 3 0 1 0 0-6M5.436 13.683A4.001 4.001 0 0 0 7 6h1.832c4.1 0 7.625-1.234 9.168-3"/></svg></div>
        <span>VozSegura</span>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="snav-item active" data-page="inicio">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Inicio
        </a>
        <a href="solicitudes.html" class="snav-item" data-page="solicitudes">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          Mis solicitudes
        </a>
        <a href="recursos.html" class="snav-item" data-page="recursos">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Recursos educativos
        </a>
        <a href="perfil.html" class="snav-item" data-page="perfil">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          Mi perfil
        </a>
      </nav>
      <button class="sidebar-logout" onclick="logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Cerrar sesión
      </button>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="app-main">

      <!-- TOP BAR -->
      <header class="app-topbar">
        <div></div>
        <div class="topbar-right">
          <button class="topbar-icon" title="Mensajes">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/></svg>
          </button>
          <div class="topbar-avatar" id="userAvatar">N</div>
        </div>
      </header>

      <!-- PAGE CONTENT -->
      <div class="page-content">
        <h2 class="page-greeting">¡Bienvenida, <span id="userName">Nombre</span>!</h2>
        <p class="page-sub">Estamos aquí para brindarte apoyo y recursos.</p>

        <!-- Illustration accent -->
        <div class="dashboard-ilu">
          <div class="ilu-circle sm-c"></div>
          <div class="ilu-symbol dash-sym">♀</div>
        </div>

        <!-- Action cards grid -->
        <div class="dash-cards">

          <a href="solicitudes.html" class="dash-card dash-card-purple">
            <div class="dash-card-ilu">
              <svg viewBox="0 0 80 80" fill="none">
                <circle cx="40" cy="25" r="16" fill="#DDD6FE" opacity=".6"/>
                <ellipse cx="40" cy="56" rx="22" ry="20" fill="#C4B5FD" opacity=".5"/>
                <path d="M25 35 Q20 40 20 50" stroke="#7C3AED" stroke-width="5" stroke-linecap="round"/>
                <rect x="28" y="42" width="10" height="14" rx="3" fill="#7C3AED" opacity=".8"/>
                <circle cx="55" cy="20" r="10" fill="#F59E0B" opacity=".85"/>
                <text x="55" y="25" text-anchor="middle" font-size="12" fill="#fff">!</text>
              </svg>
            </div>
            <span class="dash-card-label">Solicitar ayuda</span>
          </a>

          <a href="recursos.html" class="dash-card">
            <div class="dash-card-ilu">
              <svg viewBox="0 0 80 80" fill="none">
                <rect x="20" y="15" width="40" height="50" rx="4" fill="#EDE9FE"/>
                <rect x="26" y="24" width="28" height="4" rx="2" fill="#C4B5FD"/>
                <rect x="26" y="32" width="20" height="4" rx="2" fill="#DDD6FE"/>
                <rect x="26" y="40" width="24" height="4" rx="2" fill="#DDD6FE"/>
                <circle cx="55" cy="52" r="10" fill="#A78BFA" opacity=".7"/>
                <path d="M51 52 l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span class="dash-card-label">Recursos educativos</span>
          </a>

          <a href="solicitudes.html" class="dash-card">
            <div class="dash-card-ilu">
              <svg viewBox="0 0 80 80" fill="none">
                <rect x="15" y="20" width="50" height="40" rx="6" fill="#EDE9FE"/>
                <rect x="22" y="30" width="36" height="5" rx="2" fill="#C4B5FD"/>
                <rect x="22" y="39" width="26" height="5" rx="2" fill="#DDD6FE"/>
                <rect x="22" y="48" width="30" height="5" rx="2" fill="#DDD6FE"/>
                <circle cx="55" cy="22" r="8" fill="#7C3AED" opacity=".8"/>
                <path d="M52 22 h6 M55 19 v6" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </div>
            <span class="dash-card-label">Mis solicitudes</span>
          </a>

          <a href="perfil.html" class="dash-card">
            <div class="dash-card-ilu">
              <svg viewBox="0 0 80 80" fill="none">
                <circle cx="40" cy="30" r="16" fill="#EDE9FE"/>
                <circle cx="40" cy="28" r="10" fill="#C4B5FD" opacity=".8"/>
                <ellipse cx="40" cy="55" rx="20" ry="14" fill="#DDD6FE"/>
                <circle cx="40" cy="26" r="7" fill="#FBBF7A"/>
                <path d="M32 32 Q32 44 40 46 Q48 44 48 32" fill="#7C3AED" opacity=".5"/>
              </svg>
            </div>
            <span class="dash-card-label">Mi perfil</span>
          </a>

        </div>
      </div>
    </main>
  </div>

  <!-- FLOATING CHATBOT -->
  <button class="fab-chat" id="fabBtn" title="Chat con IA">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
  </button>

  <!-- CHAT MODAL -->
  <div class="chat-modal" id="chatModal">
    <div class="chat-modal-header">
      <div class="chat-modal-title">
        <div class="brand-icon xs"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2"><path d="M11 5.882V19.24a1.76 1.76 0 0 1-3.417.592l-2.147-6.15M18 13a3 3 0 1 0 0-6M5.436 13.683A4.001 4.001 0 0 0 7 6h1.832c4.1 0 7.625-1.234 9.168-3"/></svg></div>
        VozSegura IA
      </div>
      <button class="chat-close-btn" onclick="toggleChat()">✕</button>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="cmsg bot">
        <div class="cmsg-avatar">VS</div>
        <div class="cmsg-bubble">Hola 👋 Soy la IA de VozSegura. ¿En qué puedo ayudarte hoy?</div>
      </div>
    </div>
    <div class="chat-input-area">
      <input type="text" id="chatInput" class="chat-input" placeholder="Escribe tu mensaje..." autocomplete="off"/>
      <button class="chat-send-btn" onclick="sendChatMessage()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <script src="assets/js/app.js"></script>
</body>
</html>
